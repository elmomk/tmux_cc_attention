# Catppuccin Mocha theme for tmux
# https://github.com/catppuccin/catppuccin

# -- General --
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position top

# -- Status bar --
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# -- Left: session name — mauve normally, peach on prefix --
set -g status-left-length 30
set -g status-left '#{?client_prefix,#[fg=#1e1e2e]#[bg=#fab387]#[bold] #S #[fg=#fab387]#[bg=#1e1e2e]#[nobold],#[fg=#1e1e2e]#[bg=#cba6f7]#[bold] #S #[fg=#cba6f7]#[bg=#1e1e2e]#[nobold]}'

# -- Right: empty (plugin appends cross-session indicators) --
set -g status-right-length 80
set -g status-right ""

# -- Window labels --
set -g window-status-format "#[fg=#cdd6f4,bg=#313244] #I #W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I #W "
set -g window-status-separator ""

# -- Pane borders --
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# -- Message / command prompt --
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"

# -- Mode (copy mode) --
set -g mode-style "fg=#1e1e2e,bg=#cba6f7"

# -- Clock --
set -g clock-mode-colour "#cba6f7"

# -- Plugin color defaults --
set -g @claude-window-bg "#313244"
set -g @claude-active-color "#a6e3a1"
set -g @claude-attention-color "#f38ba8"
set -g @claude-stopped-color "#585b70"
