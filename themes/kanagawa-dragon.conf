# Kanagawa Dragon theme for tmux
# https://github.com/rebelot/kanagawa.nvim

# -- General --
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position top

# -- Status bar --
set -g status-style "bg=#181616,fg=#c5c9c5"

# -- Left: session name — green normally, orange on prefix --
set -g status-left-length 30
set -g status-left '#{?client_prefix,#[fg=#181616]#[bg=#b6927b]#[bold] #S #[fg=#b6927b]#[bg=#181616]#[nobold],#[fg=#181616]#[bg=#87a987]#[bold] #S #[fg=#87a987]#[bg=#181616]#[nobold]}'

# -- Right: empty (plugin appends cross-session indicators) --
set -g status-right-length 80
set -g status-right ""

# -- Window labels --
set -g window-status-format "#[fg=#c5c9c5,bg=#282727] #I #W "
set -g window-status-current-format "#[fg=#181616,bg=#a292a3,bold] #I #W "
set -g window-status-separator ""

# -- Pane borders --
set -g pane-border-style "fg=#282727"
set -g pane-active-border-style "fg=#87a987"

# -- Message / command prompt --
set -g message-style "fg=#c5c9c5,bg=#282727"
set -g message-command-style "fg=#c5c9c5,bg=#282727"

# -- Mode (copy mode) --
set -g mode-style "fg=#181616,bg=#87a987"

# -- Clock --
set -g clock-mode-colour "#87a987"

# -- Plugin color defaults --
set -g @claude-window-bg "#282727"
set -g @claude-active-color "#87a987"
set -g @claude-attention-color "#c4746e"
set -g @claude-idle-color "#b6927b"
set -g @claude-stopped-color "#8ba4b0"
