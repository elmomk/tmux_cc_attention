# Tokyo Night theme for tmux
# https://github.com/folke/tokyonight.nvim

# -- General --
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position top

# -- Status bar --
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# -- Left: session name — blue normally, orange on prefix --
set -g status-left-length 30
set -g status-left '#{?client_prefix,#[fg=#1a1b26]#[bg=#ff9e64]#[bold] #S #[fg=#ff9e64]#[bg=#1a1b26]#[nobold],#[fg=#1a1b26]#[bg=#7aa2f7]#[bold] #S #[fg=#7aa2f7]#[bg=#1a1b26]#[nobold]}'

# -- Right: empty (plugin appends cross-session indicators) --
set -g status-right-length 80
set -g status-right ""

# -- Window labels --
set -g window-status-format "#[fg=#c0caf5,bg=#292e42] #I #W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7,bold] #I #W "
set -g window-status-separator ""

# -- Pane borders --
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

# -- Message / command prompt --
set -g message-style "fg=#c0caf5,bg=#292e42"
set -g message-command-style "fg=#c0caf5,bg=#292e42"

# -- Mode (copy mode) --
set -g mode-style "fg=#1a1b26,bg=#7aa2f7"

# -- Clock --
set -g clock-mode-colour "#7aa2f7"

# -- Plugin color defaults --
set -g @claude-window-bg "#292e42"
set -g @claude-active-color "#9ece6a"
set -g @claude-attention-color "#f7768e"
set -g @claude-stopped-color "#292e42"
