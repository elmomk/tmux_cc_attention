# Dracula theme for tmux
# https://draculatheme.com

# -- General --
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position top

# -- Status bar --
set -g status-style "bg=#282a36,fg=#f8f8f2"

# -- Left: session name — purple normally, green on prefix --
set -g status-left-length 30
set -g status-left '#{?client_prefix,#[fg=#282a36]#[bg=#50fa7b]#[bold] #S #[fg=#50fa7b]#[bg=#282a36]#[nobold],#[fg=#282a36]#[bg=#bd93f9]#[bold] #S #[fg=#bd93f9]#[bg=#282a36]#[nobold]}'

# -- Right: empty (plugin appends cross-session indicators) --
set -g status-right-length 80
set -g status-right ""

# -- Window labels --
set -g window-status-format "#[fg=#f8f8f2,bg=#44475a] #I #W "
set -g window-status-current-format "#[fg=#282a36,bg=#bd93f9,bold] #I #W "
set -g window-status-separator ""

# -- Pane borders --
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

# -- Message / command prompt --
set -g message-style "fg=#f8f8f2,bg=#44475a"
set -g message-command-style "fg=#f8f8f2,bg=#44475a"

# -- Mode (copy mode) --
set -g mode-style "fg=#282a36,bg=#bd93f9"

# -- Clock --
set -g clock-mode-colour "#bd93f9"

# -- Plugin color defaults --
set -g @claude-window-bg "#44475a"
set -g @claude-active-color "#50fa7b"
set -g @claude-attention-color "#ff5555"
set -g @claude-stopped-color "#6272a4"
